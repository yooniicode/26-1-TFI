spring:
  application:
    name: byby

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/byby}
    username: ${SPRING_DATASOURCE_USERNAME:byby}
    password: ${SPRING_DATASOURCE_PASSWORD:byby123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

byby:
  security:
    jwt:
      secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-minimum-256-bits-long!!}
      expiration-ms: 86400000  # 24h
    cors:
      allowed-origins:
        - http://localhost:3000
        - ${FRONTEND_URL:http://localhost:3000}

  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    storage:
      endpoint: ${SUPABASE_URL:}/storage/v1
      buckets:
        medical-reports: medical-reports
        translation-docs: translation-docs
        emergency-assets: emergency-assets

  encryption:
    file-key: ${FILE_ENCRYPTION_KEY:}  # 32-byte hex, openssl rand -hex 32

---
# Local profile
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update  # local에서는 편의상

logging:
  level:
    com.byby: DEBUG
    org.hibernate.SQL: DEBUG

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}  # Supabase
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

logging:
  level:
    com.pypy: INFO
